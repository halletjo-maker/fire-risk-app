name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Configuration de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Installation des dépendances backend
        run: npm install

      - name: Génération Prisma
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://user:password@localhost:5432/dummy_db?schema=public

      - name: Tests backend
        run: npm test

      - name: Build backend
        run: npm run build

  frontend:
    runs-on: ubuntu-latest
    needs: backend
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Configuration de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Installation des dépendances frontend
        run: npm install

      - name: Build frontend
        run: npm run build


